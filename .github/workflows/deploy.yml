name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build WASM dashboards
        run: |
          mkdir -p dist
          uv run marimo export html-wasm notebooks/reachability_dashboard.py -o dist/reachability -f
          uv run marimo export html-wasm notebooks/bn_experiment_dashboard.py -o dist/bn_experiment -f
          uv run marimo export html-wasm notebooks/network_graph_dashboard.py -o dist/network_graph -f
          
          # Create a zip archive of the local package and place it in each dashboard directory for Pyodide runtime loading
          cd src
          zip -r ../bn_edge_removal.zip bn_edge_removal
          cd ..
          
          cp bn_edge_removal.zip dist/reachability/
          cp bn_edge_removal.zip dist/bn_experiment/
          cp bn_edge_removal.zip dist/network_graph/
          rm bn_edge_removal.zip
          
          cp scripts/portal_index.html dist/index.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
