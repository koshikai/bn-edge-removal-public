seed: 11
output_dir: outputs

model:
  name: cell_cycle10_optuna
  n_nodes: 10
  m_edges: 3
  goal_states:
    - [1, 0, 0, 0, 0, 1, 0, 0, 1, 0]

horizon:
  reach_horizon: 7
  max_steps: 10

learning:
  alpha: 0.5
  gamma: 0.95
  episodes: 60000
  epsilon:
    start: 1.0
    end: 0.01
  initial_state_strategy: random_all

reward:
  step: 2.0
  terminal: 200.0
  edge_cost: 0.0
  new_edge_cost: 0.0
  violation_penalty: 200.0

constraint:
  monotone: true
  action_masking: true

optuna:
  experiment_name: cell_cycle10_optuna
  study_name: cell_cycle10_qlearning
  storage: outputs/optuna/cell_cycle10_qlearning.sqlite3
  load_if_exists: true
  sampler_seed: 42
  n_startup_trials: 8
  n_trials: 40
  timeout_sec: null
  n_jobs: 1
  show_progress_bar: true
  eval_seeds: [11, 23]
  objective:
    success_weight: 1.0
    violation_weight: 1.0
    speed_weight: 0.2

search_space:
  alpha:
    low: 0.1
    high: 0.9
  gamma:
    low: 0.90
    high: 0.995
  episodes:
    low: 20000
    high: 140000
    step: 10000
  epsilon_end:
    low: 0.001
    high: 0.10
    log: true
  terminal:
    low: 80.0
    high: 260.0
    step: 20.0
  edge_cost:
    low: 0.0
    high: 0.3
    step: 0.05
  new_edge_cost:
    low: 0.0
    high: 0.4
    step: 0.05
  initial_state_strategy:
    choices: [random_all, cycle_all]
