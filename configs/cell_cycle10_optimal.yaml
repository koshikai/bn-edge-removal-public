seed: 11
output_dir: outputs

model:
  name: cell_cycle10
  n_nodes: 10
  m_edges: 3
  goal_states:
    - [1, 0, 0, 0, 0, 1, 0, 0, 1, 0]

horizon:
  reach_horizon: 7
  max_steps: 10

learning:
  alpha: 0.6300178274831856
  gamma: 0.929612552228494
  episodes: 80000
  epsilon:
    start: 1.0
    end: 0.0123999678368461
  initial_state_strategy: random_all

reward:
  step: 2.0
  terminal: 100.0
  edge_cost: 0.3
  new_edge_cost: 0.3
  violation_penalty: 200.0

constraint:
  monotone: true
  action_masking: true
